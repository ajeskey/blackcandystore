name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

# The built-in GITHUB_TOKEN needs write access to GitHub Packages (GHCR) to push
# the image, and write access to contents to create a GitHub Release on tags.
permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/ajeskey/blackcandystore

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            # Version release from a v* tag: publish :<version> and (unless it is
            # a beta) :latest.
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
            if echo "$VERSION" | grep -qi beta; then
              echo "DOCKER_TAG=${IMAGE}:${VERSION}" >> "$GITHUB_ENV"
            else
              echo "DOCKER_TAG=${IMAGE}:latest,${IMAGE}:${VERSION}" >> "$GITHUB_ENV"
            fi
          else
            # Branch build (main) or manual dispatch: this is the rolling build.
            # Publish :edge, and also move :latest so `docker pull ...:latest`
            # (as documented in the README) always works even before a formal
            # version is tagged. The .is-edge-release.txt marker makes the app
            # report its build as edge(<sha>).
            touch .is-edge-release.txt
            echo "DOCKER_TAG=${IMAGE}:edge,${IMAGE}:latest" >> "$GITHUB_ENV"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.DOCKER_TAG }}
          build-args: |
            COMMIT_HASH=${{ github.sha }}

  release:
    needs: build
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') }}
